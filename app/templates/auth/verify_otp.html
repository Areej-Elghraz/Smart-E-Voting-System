{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-white"><h3 class="mb-0">Verify OTP</h3></div>
            <div class="card-body">
                <p class="text-muted">Please enter the 6-digit OTP sent to your email.</p>
                <form method="POST">
                    <div class="mb-3">
                        <label for="otp" class="form-label">OTP Code</label>
                        <input type="text" class="form-control" id="otp" name="otp" required maxlength="6" pattern="\d{6}">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">Verify & Login</button>
                </form>
                <form method="POST" action="{{ url_for('auth.resend_otp') }}">
                    <button type="submit" class="btn btn-outline-secondary w-100">Resend OTP</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
